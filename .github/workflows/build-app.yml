name: Build Debug Apps

on:
    push:
        branches:
            - main

jobs:
    build-android:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            -   name: Checkout Repository
                uses: actions/checkout@v4

            -   name: Set up JDK 21
                uses: actions/setup-java@v5
                with:
                    java-version: '21'
                    distribution: 'jetbrains'

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v4

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Build Debug APK
                run: ./gradlew :app:android:assembleDebug

            -   name: Rename APK
                run: mv app/android/build/outputs/apk/debug/android-debug.apk app/android/build/outputs/apk/debug/truck-track.apk

            -   name: Delete previous latest release
                run: gh release delete latest --yes --cleanup-tag || true
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            -   name: Publish latest pre-release
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: latest
                    name: Latest Debug Build
                    prerelease: true
                    files: app/android/build/outputs/apk/debug/truck-track.apk
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build-ios:
        # No signing certificate/provisioning profile is configured yet, so this builds an
        # unsigned iOS Simulator app rather than a real, device-installable .ipa. A true .ipa
        # needs a distribution/ad-hoc certificate + provisioning profile imported into the
        # runner's keychain before `xcodebuild archive` + `-exportArchive` can produce one.
        needs: build-android
        runs-on: macos-15
        permissions:
            contents: write

        steps:
            -   name: Checkout Repository
                uses: actions/checkout@v4

            -   name: Set up JDK 21
                uses: actions/setup-java@v5
                with:
                    java-version: '21'
                    distribution: 'jetbrains'

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v4

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Select latest Xcode
                uses: maxim-lobanov/setup-xcode@v1
                with:
                    xcode-version: latest-stable

            -   name: Build iOS Simulator app
                run: |
                    xcodebuild \
                        -project app/ios/iosApp.xcodeproj \
                        -scheme iosApp \
                        -sdk iphonesimulator \
                        -configuration Debug \
                        -destination 'generic/platform=iOS Simulator' \
                        -derivedDataPath build-ios \
                        CODE_SIGNING_ALLOWED=NO \
                        build

            -   name: Zip Simulator app
                run: |
                    cd build-ios/Build/Products/Debug-iphonesimulator
                    zip -r truck-track-ios-simulator.zip iosApp.app

            -   name: Publish latest pre-release
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: latest
                    name: Latest Debug Build
                    prerelease: true
                    files: build-ios/Build/Products/Debug-iphonesimulator/truck-track-ios-simulator.zip
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
