<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruckTrack – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="./theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', sans-serif;
      background: #ECEFF1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: var(--tt-surface-container-lowest);
      border-radius: 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .status-bar {
      background: var(--tt-primary);
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      color: var(--tt-on-primary);
      font-size: 12px;
      font-weight: 500;
      flex-shrink: 0;
    }
    /* Full-screen hero: image + primary overlay */
    .hero {
      flex: 1;
      background:
        linear-gradient(0deg,
          hsl(from var(--tt-primary) h s l / 70%),
          hsl(from var(--tt-primary) h s l / 70%)
        ),
        url(../../app/feature/sign-in/impl/src/commonMain/composeResources/drawable/sign_in_hero.webp);
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px;
    }
    .hero-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .hero-icon {
      width: 72px;
      height: 72px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-icon .material-icons { font-size: 40px; color: var(--tt-on-primary); }
    .hero h1 {
      color: var(--tt-on-primary);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .hero p {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      font-weight: 400;
    }
    .hero-bottom {
      padding-bottom: 48px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .btn-tonal {
      background: var(--tt-primary-container);
      color: var(--tt-on-primary-container);
      border: none;
      border-radius: 28px;
      padding: 16px;
      font-size: 16px;
      font-weight: 500;
      font-family: 'Roboto', sans-serif;
      cursor: pointer;
      width: 100%;
      letter-spacing: 0.5px;
    }
    .error-text {
      color: var(--tt-error);
      font-size: 13px;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <span>
        <span class="material-icons" style="font-size:14px;">signal_cellular_4_bar</span>
        <span class="material-icons" style="font-size:14px; margin-left:2px;">battery_full</span>
      </span>
    </div>

    <!-- Full-screen hero: truck photo + primary overlay -->
    <div class="hero">
      <div class="hero-center">
        <div class="hero-icon">
          <span class="material-icons">local_shipping</span>
        </div>
        <h1>TruckTrack</h1>
        <p>Fleet maintenance, simplified</p>
      </div>
      <!-- Button sits at the bottom of the image, no separate panel -->
      <div class="hero-bottom">
        <button class="btn-tonal">Sign In</button>
        <!-- Error state (shown instead of nothing when SignInState.Error.*) -->
        <div class="error-text">No internet connection. Check your network and try again.</div>
      </div>
    </div>
  </div>
</body>
</html>
