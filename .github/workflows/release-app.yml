name: Release App

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    release-android:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            version-name: ${{ steps.version.outputs.name }}
            version-code: ${{ steps.version.outputs.code }}

        steps:
            -   name: Checkout Repository
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Parse version from tag
                id: version
                run: |
                    TAG="${GITHUB_REF_NAME}"
                    if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                        echo "Tag '$TAG' does not match required vMAJOR.MINOR.PATCH format" >&2
                        exit 1
                    fi

                    MAJOR="${BASH_REMATCH[1]}"
                    MINOR="${BASH_REMATCH[2]}"
                    PATCH="${BASH_REMATCH[3]}"

                    if [ "$MINOR" -ge 100 ] || [ "$PATCH" -ge 100 ]; then
                        echo "MINOR and PATCH must be less than 100 to avoid versionCode collisions" >&2
                        exit 1
                    fi

                    VERSION_NAME="${MAJOR}.${MINOR}.${PATCH}"
                    VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

                    echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
                    echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

            -   name: Set up JDK 21
                uses: actions/setup-java@v5
                with:
                    java-version: '21'
                    distribution: 'jetbrains'
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v4

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Decode release keystore
                run: |
                    KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
                    echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
                    echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
                env:
                    ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

            -   name: Build Release APK and AAB
                run: |
                    ./gradlew :app:android:assembleRelease :app:android:bundleRelease \
                        -PappVersionName=${{ steps.version.outputs.name }} \
                        -PappVersionCode=${{ steps.version.outputs.code }} \
                        -PandroidKeystoreFile="$KEYSTORE_PATH" \
                        -PandroidKeystorePassword="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
                        -PandroidKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" \
                        -PandroidKeyPassword="${{ secrets.ANDROID_KEY_PASSWORD }}"

            -   name: Remove decoded keystore
                if: always()
                run: rm -f "$KEYSTORE_PATH"

            -   name: Rename outputs
                run: |
                    mv app/android/build/outputs/apk/release/android-release.apk "app/android/build/outputs/apk/release/truck-track-${{ steps.version.outputs.name }}.apk"
                    mv app/android/build/outputs/bundle/release/android-release.aab "app/android/build/outputs/bundle/release/truck-track-${{ steps.version.outputs.name }}.aab"

            -   name: Publish Release
                run: |
                    gh release create "${GITHUB_REF_NAME}" \
                        "app/android/build/outputs/apk/release/truck-track-${{ steps.version.outputs.name }}.apk" \
                        "app/android/build/outputs/bundle/release/truck-track-${{ steps.version.outputs.name }}.aab" \
                        --title "${GITHUB_REF_NAME}" \
                        --notes "Release build ${{ steps.version.outputs.name }} (${{ github.sha }})"
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            -   name: Generate changelog since previous release
                run: |
                    PREVIOUS_TAG=$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | grep -B1 -x "${GITHUB_REF_NAME}" | head -1)
                    if [ "$PREVIOUS_TAG" = "${GITHUB_REF_NAME}" ]; then
                        PREVIOUS_TAG=""
                    fi

                    {
                        if [ -n "$PREVIOUS_TAG" ]; then
                            echo "Changes since $PREVIOUS_TAG:"
                            git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${GITHUB_REF_NAME}"
                        else
                            echo "Initial release."
                            git log --pretty=format:"- %s" "${GITHUB_REF_NAME}"
                        fi
                        echo ""
                        echo ""
                        echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    } > release-notes.txt

            -   name: Distribute release APK to Firebase App Distribution
                run: |
                    npx firebase-tools@latest appdistribution:distribute \
                        "app/android/build/outputs/apk/release/truck-track-${{ steps.version.outputs.name }}.apk" \
                        --app "$FIREBASE_APP_ID" \
                        --groups "release" \
                        --release-notes-file release-notes.txt
                env:
                    FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
                    FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

    release-ios:
        needs: [ release-android ]
        runs-on: macos-15
        permissions:
            contents: write

        steps:
            -   name: Checkout Repository
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Set up JDK 21
                uses: actions/setup-java@v5
                with:
                    java-version: '21'
                    distribution: 'jetbrains'
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v4

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Select latest Xcode
                uses: maxim-lobanov/setup-xcode@v1
                with:
                    xcode-version: latest-stable

            -   name: Check iOS signing secrets are configured
                id: check-secrets
                run: |
                    if [ -n "$IOS_TEAM_ID" ] && [ -n "$IOS_CERT_B64" ] && [ -n "$IOS_CERT_PASSWORD" ] && [ -n "$IOS_PROFILE_B64" ]; then
                        echo "configured=true" >> "$GITHUB_OUTPUT"
                    else
                        echo "::warning::iOS signing secrets are not configured yet — skipping the iOS release build. See docs/KMP_IOS_READINESS.md."
                        echo "configured=false" >> "$GITHUB_OUTPUT"
                    fi
                env:
                    IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
                    IOS_CERT_B64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
                    IOS_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
                    IOS_PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}

            -   name: Import signing certificate and provisioning profile
                if: steps.check-secrets.outputs.configured == 'true'
                env:
                    IOS_CERT_B64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
                    IOS_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
                    IOS_PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
                run: |
                    KEYCHAIN_PATH="$RUNNER_TEMP/ios-signing.keychain-db"
                    KEYCHAIN_PASSWORD=$(uuidgen)
                    CERT_PATH="$RUNNER_TEMP/distribution.p12"
                    PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

                    echo "$IOS_CERT_B64" | base64 --decode -o "$CERT_PATH"
                    echo "$IOS_PROFILE_B64" | base64 --decode -o "$PROFILE_PATH"

                    security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                    security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
                    security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                    security import "$CERT_PATH" -P "$IOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
                    security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
                    security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

                    PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
                    mkdir -p "$PROFILE_DIR"
                    PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | /usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin)
                    PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | /usr/libexec/PlistBuddy -c "Print Name" /dev/stdin)
                    cp "$PROFILE_PATH" "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"

                    echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
                    echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

            -   name: Generate export options plist
                if: steps.check-secrets.outputs.configured == 'true'
                env:
                    IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
                run: |
                    cat > "$RUNNER_TEMP/exportOptions.plist" <<PLIST
                    <?xml version="1.0" encoding="UTF-8"?>
                    <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                    <plist version="1.0">
                    <dict>
                        <key>method</key>
                        <string>ad-hoc</string>
                        <key>teamID</key>
                        <string>$IOS_TEAM_ID</string>
                        <key>signingStyle</key>
                        <string>manual</string>
                        <key>provisioningProfiles</key>
                        <dict>
                            <key>com.momosi.trucktrack</key>
                            <string>$PROFILE_NAME</string>
                        </dict>
                    </dict>
                    </plist>
                    PLIST

            -   name: Archive signed iOS release app
                if: steps.check-secrets.outputs.configured == 'true'
                env:
                    IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
                    VERSION_NAME: ${{ needs.release-android.outputs.version-name }}
                    VERSION_CODE: ${{ needs.release-android.outputs.version-code }}
                run: |
                    xcodebuild archive \
                        -project app/ios/iosApp.xcodeproj \
                        -scheme iosApp \
                        -sdk iphoneos \
                        -configuration Release \
                        -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
                        -destination 'generic/platform=iOS' \
                        CODE_SIGN_STYLE=Manual \
                        CODE_SIGN_IDENTITY="Apple Distribution" \
                        DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
                        PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
                        MARKETING_VERSION="$VERSION_NAME" \
                        CURRENT_PROJECT_VERSION="$VERSION_CODE"

            -   name: Export signed .ipa
                if: steps.check-secrets.outputs.configured == 'true'
                env:
                    VERSION_NAME: ${{ needs.release-android.outputs.version-name }}
                run: |
                    xcodebuild -exportArchive \
                        -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
                        -exportPath "$RUNNER_TEMP/export" \
                        -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist"
                    mv "$RUNNER_TEMP/export/iosApp.ipa" "$RUNNER_TEMP/truck-track-${VERSION_NAME}.ipa"

            -   name: Upload .ipa to GitHub Release
                if: steps.check-secrets.outputs.configured == 'true'
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    VERSION_NAME: ${{ needs.release-android.outputs.version-name }}
                run: gh release upload "${GITHUB_REF_NAME}" "$RUNNER_TEMP/truck-track-${VERSION_NAME}.ipa"

            -   name: Generate changelog since previous release
                if: steps.check-secrets.outputs.configured == 'true'
                run: |
                    PREVIOUS_TAG=$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | grep -B1 -x "${GITHUB_REF_NAME}" | head -1)
                    if [ "$PREVIOUS_TAG" = "${GITHUB_REF_NAME}" ]; then
                        PREVIOUS_TAG=""
                    fi

                    {
                        if [ -n "$PREVIOUS_TAG" ]; then
                            echo "Changes since $PREVIOUS_TAG:"
                            git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${GITHUB_REF_NAME}"
                        else
                            echo "Initial release."
                            git log --pretty=format:"- %s" "${GITHUB_REF_NAME}"
                        fi
                        echo ""
                        echo ""
                        echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    } > release-notes.txt

            -   name: Distribute release .ipa to Firebase App Distribution
                if: steps.check-secrets.outputs.configured == 'true'
                env:
                    FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
                    FIREBASE_IOS_APP_ID: ${{ secrets.FIREBASE_IOS_APP_ID }}
                    VERSION_NAME: ${{ needs.release-android.outputs.version-name }}
                run: |
                    npx firebase-tools@latest appdistribution:distribute \
                        "$RUNNER_TEMP/truck-track-${VERSION_NAME}.ipa" \
                        --app "$FIREBASE_IOS_APP_ID" \
                        --groups "release" \
                        --release-notes-file release-notes.txt

            -   name: Clean up signing keychain
                if: always() && steps.check-secrets.outputs.configured == 'true'
                run: security delete-keychain "$KEYCHAIN_PATH" || true
