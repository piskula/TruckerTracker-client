spring:
  application:
    name: TruckerTracker
  datasource:
    url: ${POSTGRES_DB_URL:jdbc:postgresql://localhost:5435/truckTrack?stringtype=unspecified}
    username: ${POSTGRES_DB_USER:truckTrack}
    password: ${POSTGRES_DB_PASSWORD:truckTrack-password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/changelog-master.yaml
  jackson:
    constructor-detector: use-properties-based
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://sso.momosi.org/realms/trucktrack
  servlet:
    multipart:
      enabled: true
      max-file-size: 15MB
      max-request-size: 15MB

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

server:
  port: 8085
  # to allow swagger-ui to perform requests against HTTPS
  forward-headers-strategy: framework

springdoc:
  oauth2:
    authorization-url: https://sso.momosi.org/realms/trucktrack/protocol/openid-connect/auth
    token-url: https://sso.momosi.org/realms/trucktrack/protocol/openid-connect/token
  swagger-ui:
    oauth:
      client-id: trucktrack-app
      use-pkce-with-authorization-code-grant: true
