name: Build Debug APK

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            -   name: Checkout Repository
                uses: actions/checkout@v4

            -   name: Set up JDK 21
                uses: actions/setup-java@v5
                with:
                    java-version: '21'
                    distribution: 'jetbrains'

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v4

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Build Debug APK
                run: ./gradlew assembleDebug

            -   name: Rename APK
                run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/truck-track.apk

            -   name: Publish latest pre-release
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: latest
                    name: Latest Debug Build
                    prerelease: true
                    files: app/build/outputs/apk/debug/truck-track.apk
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
