<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #78909C;
      font-family: 'Roboto', sans-serif;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: fit-content;
    }
    h1 {
      color: #ECEFF1;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.85;
    }
    .screens {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }
    .screen-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .phone-clip {
      border-radius: 40px;
      overflow: hidden;
      width: 390px;
      height: 844px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.35);
    }
    iframe {
      width: 390px;
      height: 844px;
      border: none;
      display: block;
    }
    .label {
      font-size: 11px;
      font-weight: 500;
      color: #ECEFF1;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <h1>Transroute Tracker &mdash; Driver</h1>
  <div class="screens">
    <div class="screen-wrap">
      <div class="phone-clip">
        <iframe src="01-login.html"></iframe>
      </div>
      <span class="label">Login</span>
    </div>
    <div class="screen-wrap">
      <div class="phone-clip">
        <iframe src="driver/02-dashboard.html"></iframe>
      </div>
      <span class="label">Dashboard</span>
    </div>
    <div class="screen-wrap">
      <div class="phone-clip">
        <iframe src="driver/03-create-request.html"></iframe>
      </div>
      <span class="label">New Issue</span>
    </div>
    <div class="screen-wrap">
      <div class="phone-clip">
        <iframe src="driver/04-request-detail.html"></iframe>
      </div>
      <span class="label">Issue Detail</span>
    </div>
  </div>
</body>
</html>
