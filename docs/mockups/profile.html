<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruckTrack – Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="./theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', sans-serif;
      background: #ECEFF1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: var(--tt-surface-container-lowest);
      border-radius: 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      background: var(--tt-surface-dim);
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      color: var(--tt-on-surface);
      font-size: 12px;
      font-weight: 500;
      flex-shrink: 0;
    }
    /* Toolbar: back arrow + "Profile" title, no actions */
    .top-bar {
      background: var(--tt-surface-dim);
      padding: 12px 8px 12px 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .back-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
    }
    .back-btn .material-icons { color: var(--tt-on-surface); font-size: 24px; }
    .top-bar h2 { color: var(--tt-on-surface); font-size: 20px; font-weight: 700; }

    /* Hero fills the remaining space (weight 1f) */
    .hero {
      flex: 1;
      background: linear-gradient(160deg, var(--tt-primary) 0%, #0074e9 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar .material-icons { font-size: 56px; color: var(--tt-on-primary); }
    .hero h1 {
      margin-top: 16px;
      color: var(--tt-on-primary);
      font-size: 22px;
      font-weight: 700;
    }
    .hero .email {
      margin-top: 4px;
      color: rgba(255,255,255,0.75);
      font-size: 14px;
    }
    .hero .roles {
      margin-top: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
    }

    .bottom-panel {
      background: var(--tt-surface-container-lowest);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }
    .btn-primary {
      background: var(--tt-primary);
      color: var(--tt-on-primary);
      border: none;
      border-radius: 28px;
      padding: 16px;
      font-size: 16px;
      font-weight: 500;
      font-family: 'Roboto', sans-serif;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 12px rgba(0,92,187,0.35);
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <span>
        <span class="material-icons" style="font-size:14px;">signal_cellular_4_bar</span>
        <span class="material-icons" style="font-size:14px; margin-left:2px;">battery_full</span>
      </span>
    </div>

    <div class="top-bar">
      <div class="back-btn"><span class="material-icons">arrow_back</span></div>
      <h2>Profile</h2>
    </div>

    <div class="hero">
      <div class="avatar">
        <span class="material-icons">person</span>
      </div>
      <h1>Michael Schumacher</h1>
      <div class="email">michael@example.com</div>
      <div class="roles">Driver</div>
    </div>

    <div class="bottom-panel">
      <button class="btn-primary">Sign Out</button>
    </div>
  </div>
</body>
</html>
