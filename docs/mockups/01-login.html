<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruckTrack – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="./theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', sans-serif;
      background: #ECEFF1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: var(--tt-surface-container-lowest);
      border-radius: 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .status-bar {
      background: var(--tt-primary);
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      color: var(--tt-on-primary);
      font-size: 12px;
      font-weight: 500;
      flex-shrink: 0;
    }
    /* Hero takes ~75% of the screen height (weight 0.75) */
    .hero {
      flex: 0.75;
      background:
        linear-gradient(0deg,
          hsl(from var(--tt-primary) h s l / 75%),
          hsl(from var(--tt-primary) h s l / 65%)
        ),
        url(../../app/feature/sign-in/impl/src/commonMain/composeResources/drawable/sign_in_hero.jpg);
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .hero-icon {
      width: 72px;
      height: 72px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-icon .material-icons { font-size: 40px; color: var(--tt-on-primary); }
    .hero h1 {
      color: var(--tt-on-primary);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .hero p {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      font-weight: 400;
    }
    /* Bottom panel is the remaining ~25% (weight 0.25) */
    .form-area {
      flex: 0.25;
      background: var(--tt-surface-container-lowest);
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .btn-primary {
      background: var(--tt-primary);
      color: var(--tt-on-primary);
      border: none;
      border-radius: 28px;
      padding: 16px;
      font-size: 16px;
      font-weight: 500;
      font-family: 'Roboto', sans-serif;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 12px rgba(0,92,187,0.35);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .error-text {
      color: var(--tt-error);
      font-size: 13px;
      text-align: center;
      line-height: 1.4;
    }
    .note {
      position: absolute;
      bottom: 8px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 10px;
      color: #B0BEC5;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <span>
        <span class="material-icons" style="font-size:14px;">signal_cellular_4_bar</span>
        <span class="material-icons" style="font-size:14px; margin-left:2px;">battery_full</span>
      </span>
    </div>

    <!-- Hero: gradient background, app icon, name, tagline -->
    <div class="hero">
      <div class="hero-icon">
        <span class="material-icons">local_shipping</span>
      </div>
      <h1>TruckTrack</h1>
      <p>Fleet maintenance, simplified</p>
    </div>

    <!-- Single sign-in action — real screen has no username/password fields,
         it triggers an OAuth/OIDC browser flow via AuthManager -->
    <div class="form-area">
      <button class="btn-primary">Sign In</button>
      <!-- Error state (shown instead of nothing when SignInState.Error.*) -->
      <div class="error-text">No internet connection. Check your network and try again.</div>
    </div>

    <div class="note">Real screen: no form fields — "Sign In" opens the OAuth browser flow</div>
  </div>
</body>
</html>
