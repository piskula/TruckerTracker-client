name: Build Server

on:
    push:
        branches:
            - main
        paths:
            - 'server/**'
            - 'shared/**'
            - 'gradle/libs.versions.toml'
            - '.github/workflows/build-server.yml'
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout Repository
                uses: actions/checkout@v4

            -   name: Set up JDK 21
                uses: actions/setup-java@v5
                with:
                    java-version: '21'
                    distribution: 'temurin'

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

            -   name: Grant execute permission for gradlew
                working-directory: server
                run: chmod +x gradlew

            -   name: Build with Gradle Wrapper
                working-directory: server
                run: ./gradlew clean build

            -   name: Upload build artifacts
                uses: actions/upload-artifact@v4
                with:
                    name: module-server-jar
                    path: |
                        server/module-server/build/libs/module-server-*.jar
                        !server/module-server/build/libs/module-server-*-plain.jar
                    retention-days: 7

    deploy:
        needs: build
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'

        steps:
            -   name: Download build artifact
                uses: actions/download-artifact@v4
                with:
                    name: module-server-jar
                    path: ./artifact

            -   name: Rename JAR for upload
                run: mv $(ls ./artifact/module-server-*.jar | head -1) ./module-server-new.jar

            -   name: Copy JAR to server
                uses: appleboy/scp-action@v0.1.7
                with:
                    host: ${{ secrets.DEPLOY_HOST }}
                    username: ${{ secrets.DEPLOY_USER }}
                    key: ${{ secrets.DEPLOY_SSH_KEY }}
                    host_key: ${{ secrets.DEPLOY_HOST_KEY }}
                    source: module-server-new.jar
                    target: ~/module-server-tt/

            -   name: Deploy on server
                uses: appleboy/ssh-action@v1.0.3
                with:
                    host: ${{ secrets.DEPLOY_HOST }}
                    username: ${{ secrets.DEPLOY_USER }}
                    key: ${{ secrets.DEPLOY_SSH_KEY }}
                    host_key: ${{ secrets.DEPLOY_HOST_KEY }}
                    script: |
                        rm -f ~/module-server-tt/module-server.jar.bak
                        systemctl stop trucker-service.service
                        mv ~/module-server-tt/module-server.jar ~/module-server-tt/module-server.jar.bak 2>/dev/null || true
                        mv ~/module-server-tt/module-server-new.jar ~/module-server-tt/module-server.jar
                        mv ~/module-server-tt/server.log ~/module-server-tt/server-$(date +%Y%m%d-%H%M%S).log 2>/dev/null || true
                        systemctl start trucker-service.service

    dependency-submission:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            -   name: Checkout Repository
                uses: actions/checkout@v4

            -   name: Set up JDK 21
                uses: actions/setup-java@v5
                with:
                    java-version: '21'
                    distribution: 'temurin'

            -   name: Generate and submit dependency graph
                uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
                with:
                    build-root-directory: server
