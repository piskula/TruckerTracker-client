spring:
  application:
    name: TruckerTracker
  datasource:
    url: ${POSTGRES_DB_URL:jdbc:postgresql://localhost:5435/truckTrack?stringtype=unspecified}
    username: ${POSTGRES_DB_USER:truckTrack}
    password: ${POSTGRES_DB_PASSWORD:truckTrack-password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/changelog-master.yaml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://sso.momosi.org/realms/momosi

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

server:
  port: 8080
